query GetForms {
  forms {
    id
    title
    description
    createdAt
  }
}

query GetForm($id: ID!) {
  form(id: $id) {
    id
    title
    description
    createdAt
    questions {
      id
      title
      type
      options
    }
  }
}

query GetResponses($formId: ID!) {
  responses(formId: $formId) {
    id
    formId
    submittedAt
    answers {
      questionId
      value
    }
  }
}